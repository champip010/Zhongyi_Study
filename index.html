<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acupuncture Study Web | 针灸学习</title>
    <!-- Google Fonts for Modern Typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-yin-yang"></i> 针灸通
            </div>
            <ul class="nav-links">
                <li><a href="#" data-view="dashboard" class="active"><i class="fa-solid fa-house"></i> 首页
                        (Dashboard)</a></li>
                <li><a href="#" data-view="flashcards"><i class="fa-solid fa-layer-group"></i> 闪卡 (Flashcards)</a></li>
                <li><a href="#" data-view="quiz"><i class="fa-solid fa-clipboard-question"></i> 测试 (Quiz)</a></li>
                <li><a href="#" data-view="manage"><i class="fa-solid fa-list-check"></i> 管理病症</a></li>
                <li><a href="#" data-view="acupoints"><i class="fa-solid fa-circle-dot"></i> 穴位大全</a></li>
                <li><a href="#" data-view="neike"><i class="fa-solid fa-book-medical"></i> 内科学习</a></li>
            </ul>
            <div class="theme-toggle">
                <button id="theme-btn"><i class="fa-solid fa-moon"></i></button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="content">
            <!-- Header -->
            <header>
                <div class="header-title">
                    <h1 id="page-title">首页</h1>
                </div>
            </header>

            <!-- Views Container -->
            <div id="views">
                <!-- Dashboard View -->
                <section id="view-dashboard" class="view active">
                    <div class="stats-overview">
                        <div class="stat-card">
                            <h3>总记录数</h3>
                            <p class="stat-value" id="stat-total">0</p>
                            <i class="fa-solid fa-database stat-icon"></i>
                        </div>
                        <div class="stat-card">
                            <h3>测试分数</h3>
                            <p class="stat-value" id="stat-score">0</p>
                            <i class="fa-solid fa-star stat-icon"></i>
                        </div>
                    </div>
                    <div class="welcome-banner">
                        <h2>欢迎使用针灸学习系统</h2>
                        <p>请从左侧选择学习模式：通过闪卡复习穴位，或参加测试检验您的知识。</p>
                        <button class="primary-btn" onclick="app.switchView('flashcards')">开始学习</button>
                    </div>
                </section>

                <!-- Flashcards View -->
                <section id="view-flashcards" class="view hidden">
                    <div class="flashcard-mode-toggle">
                        <button class="mode-btn active" data-mode="illness">疾病配穴 (Illnesses)</button>
                        <button class="mode-btn" data-mode="acupoint">穴位百科 (Acupoints)</button>
                        <button class="mode-btn" data-mode="neike">内科方剂 (Internal Med)</button>
                    </div>

                    <div class="flashcard-controls">
                        <span class="progress-text" id="fc-progress">1 / 10</span>
                        <button class="icon-btn" id="fc-shuffle" title="打乱"><i class="fa-solid fa-shuffle"></i></button>
                    </div>

                    <div class="flashcard-container" id="fc-container">
                        <!-- Card injected via JS -->
                    </div>

                    <div class="flashcard-actions">
                        <button class="secondary-btn" id="fc-prev"><i class="fa-solid fa-arrow-left"></i> 上一个</button>
                        <button class="primary-btn" id="fc-flip">翻转卡片</button>
                        <button class="secondary-btn" id="fc-next">下一个 <i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </section>

                <!-- Quiz View -->
                <section id="view-quiz" class="view hidden">
                    <div class="quiz-setup" id="quiz-setup">
                        <h2>知识测试</h2>
                        <p>准备好测试您的针灸与内科知识了吗？</p>
                        
                        <div class="quiz-type-selection" style="margin: 20px 0; text-align: left; max-width: 300px; margin-left: auto; margin-right: auto;">
                            <label style="display: block; margin-bottom: 12px; cursor: pointer; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;">
                                <input type="radio" name="quiz-type" value="acupuncture" checked> 针灸配穴测试
                            </label>
                            <label style="display: block; cursor: pointer; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;">
                                <input type="radio" name="quiz-type" value="neike"> 内科方剂测试
                            </label>
                        </div>

                        <button class="primary-btn" id="quiz-start">开始测试 (10题)</button>
                    </div>

                    <div class="quiz-active hidden" id="quiz-active">
                        <div class="quiz-header">
                            <h3 id="quiz-question-num">问题 1 / 10</h3>
                            <div class="quiz-score">得分: <span id="quiz-current-score">0</span></div>
                        </div>
                        <div class="quiz-question-box">
                            <p id="quiz-question-text">加载中...</p>
                        </div>
                        <div class="quiz-options" id="quiz-options">
                            <!-- Options injected via JS -->
                        </div>
                        <div class="quiz-feedback hidden" id="quiz-feedback">
                            <!-- Feedback injected via JS -->
                        </div>
                        <button class="primary-btn hidden" id="quiz-next">下一题</button>
                    </div>

                    <div class="quiz-result hidden" id="quiz-result">
                        <h2>测试完成！</h2>
                        <div class="score-circle">
                            <span id="quiz-final-score">0%</span>
                        </div>
                        <p id="quiz-final-text">再接再厉！</p>
                        <button class="primary-btn" id="quiz-restart">重新测试</button>
                    </div>
                </section>

                <!-- Manage View -->
                <section id="view-manage" class="view hidden">
                    <div class="manage-header">
                        <div class="search-box">
                            <i class="fa-solid fa-search"></i>
                            <input type="text" id="manage-search" placeholder="搜索病名或穴位...">
                        </div>
                        <button class="primary-btn" id="manage-reset">恢复初始数据</button>
                    </div>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>病名</th>
                                    <th>证型</th>
                                    <th>治疗原则</th>
                                    <th>主穴</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="manage-tbody">
                                <!-- Rows injected via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Acupoints View -->
                <section id="view-acupoints" class="view hidden">
                    <div class="acupoints-toolbar">
                        <div class="search-box">
                            <i class="fa-solid fa-search"></i>
                            <input type="text" id="acu-search" placeholder="搜索穴位名、拼音或代码...">
                        </div>
                        <div class="meridian-filter" id="meridian-filter">
                            <!-- Meridian buttons injected by JS -->
                        </div>
                    </div>
                    <div id="acu-list-container" class="acu-list-grid">
                        <!-- Cards injected by JS -->
                    </div>
                </section>

                <!-- Internal Medicine View -->
                <section id="view-neike" class="view hidden">
                    <div class="neike-toolbar">
                        <div class="category-tabs" id="neike-categories">
                            <button class="cat-btn active" data-cat="all">全部</button>
                            <button class="cat-btn" data-cat="肺">肺系</button>
                            <button class="cat-btn" data-cat="心脑">心脑</button>
                            <button class="cat-btn" data-cat="脾">脾胃</button>
                            <button class="cat-btn" data-cat="肝">肝胆</button>
                            <button class="cat-btn" data-cat="肾">肾系</button>
                            <button class="cat-btn" data-cat="气血津液">气血</button>
                        </div>
                        <div class="search-box">
                            <i class="fa-solid fa-search"></i>
                            <input type="text" id="neike-search" placeholder="搜索疾病、证型或处方...">
                        </div>
                    </div>
                    <div id="neike-list-container" class="neike-grid">
                        <!-- Content injected via JS -->
                    </div>
                </section>

                <!-- Acupoint Info View -->
                <section id="view-acupoint-info" class="view hidden">
                    <div id="acupoint-info-content">
                        <!-- Content injected via JS -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="acukg.js"></script>
    <script src="acukg_handler.js"></script>
    <script src="data.js"></script>
    <script src="store.js"></script>
    <script src="flashcards.js"></script>
    <script src="quiz.js"></script>
    <script src="manage.js"></script>
    <script src="acupoints.js"></script>
    <script src="neike_data.js"></script>
    <script src="neike.js"></script>
    <script src="app.js"></script>
</body>

</html>
